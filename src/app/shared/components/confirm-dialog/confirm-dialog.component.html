<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p class="message">{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close
    i18n="Confirm dialog|Cancel button@@confirmDialog.btn.cancel">Cancel</button>
  <button mat-raised-button color="warn" [mat-dialog-close]="true"
    i18n="Confirm dialog|Confirm button@@confirmDialog.btn.confirm">Confirm</button>
</mat-dialog-actions>
